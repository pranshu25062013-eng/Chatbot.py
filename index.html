<!DOCTYPE html>
<html>
<head>
<title>Pranshu AI Chatbot</title>
</head>

<body>
<h1>Simple AI Chatbot</h1>
<p>Hello! This is my first chatbot project.</p>

<input type="text" id="userInput" placeholder="Say something">
<button onclick="reply()">Send</button>

<p id="botReply"></p>

<script>
function reply() {
  var input = document.getElementById("userInput").value.toLowerCase();
  var reply = "I don't understand.";

  if (input == "hello") {
    reply = "Hi there!";
  }
  else if (input == "how are you") {
    reply = "I'm doing great!";
  }
  else if (input == "your name") {
    reply = "I am Pranshu's AI bot.";
  }

  document.getElementById("botReply").innerText = reply;
}
</script>

</body>
</html>
